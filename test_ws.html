<!DOCTYPE html>
<html>
<head>
  <title>Analytics WebSocket Test</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #00ff00; padding: 20px; }
    h2 { color: #ffffff; }
    #log { border: 1px solid #333; padding: 10px; height: 400px; overflow-y: auto; }
    .event { margin: 4px 0; padding: 4px; background: #2a2a2a; border-left: 3px solid #00ff00; }
    button { margin: 5px; padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🔴 Analytics Live Feed</h2>
  <button onclick="connect()">Connect</button>
  <button onclick="disconnect()">Disconnect</button>
  <p id="status">Status: Disconnected</p>
  <div id="log"></div>

  <script>
    let ws = null;

    function connect() {
      ws = new WebSocket("ws://127.0.0.1:8000/ws/analytics");

      ws.onopen = () => {
        document.getElementById("status").innerText = "Status: 🟢 Connected";
        log("Connected to Analytics WebSocket");
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        log(`[${data.type}] ${data.event_type || ''} | page: ${data.page || ''} | user: ${data.user_id || ''} | ${data.timestamp || ''}`);
      };

      ws.onclose = () => {
        document.getElementById("status").innerText = "Status: 🔴 Disconnected";
        log("Disconnected");
      };
    }

    function disconnect() {
      if (ws) ws.close();
    }

    function log(msg) {
      const div = document.getElementById("log");
      div.innerHTML = `<div class="event">${new Date().toLocaleTimeString()} — ${msg}</div>` + div.innerHTML;
    }
  </script>
</body>
</html>
